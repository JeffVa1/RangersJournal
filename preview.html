<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Preview</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="preview-page">
  <header class="preview-header">
    <a class="back-link" href="index.html">&larr; Library</a>
    <div class="page-title">
      <img class="site-title-image" src="assets/title.png" alt="The Shattered Crown" />
      <p id="preview-book-title" class="book-heading">Loading...</p>
    </div>
  </header>

  <main class="preview-layout" id="preview-layout">
    <a
      id="preview-book-link"
      class="preview-book-link"
      href="viewer.html"
      aria-label="Open book"
    >
      <img id="preview-book-cover" class="preview-book-cover" src="" alt="" />
    </a>
    <section class="preview-summary-panel" aria-labelledby="preview-summary-heading">
      <div class="preview-summary-scroll">
        <h2 id="preview-summary-heading" class="preview-summary-heading">Summary</h2>
        <div id="preview-summary-content" class="preview-summary-content">
          <p>Loading summary...</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/preview.js"></script>
</body>
</html>
