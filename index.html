<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rangers Journal Library</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/book-hover-glow.css" />
</head>
<body class="library-page">
  <main class="library-main">
    <section class="site-intro">
      <div class="site-brand">
        <h1 class="site-title-text">Shattered Crown</h1>
        <p class="subtitle" id="library-subtitle" data-default="Select a book to start reading.">
          <span class="subtitle-text">Select a book to start reading.</span>
        </p>
      </div>
    </section>

    <section class="library" id="library" aria-live="polite">
      <div class="loading">Loading books...</div>
    </section>
  </main>

  <script type="module" src="js/library.js"></script>
</body>
</html>
