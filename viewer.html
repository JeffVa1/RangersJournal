<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Viewer</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body class="viewer-page">
  <div
    id="mobile-rotate-overlay"
    class="mobile-rotate-overlay"
    hidden
    aria-hidden="true"
  >
    <div class="mobile-rotate-overlay__content">
      <p class="mobile-rotate-overlay__eyebrow">Shattered Crown</p>
      <h2 class="mobile-rotate-overlay__title">Please rotate your device to landscape</h2>
      <p class="mobile-rotate-overlay__text">
        Rangers Journal is easier to read in landscape on mobile.
      </p>
    </div>
  </div>
  <div class="viewer-background" aria-hidden="true">
    <div class="viewer-background-layer viewer-background-layer-map"></div>
    <div class="viewer-background-layer viewer-background-layer-book"></div>
  </div>
  <main class="viewer-main">
    <section class="page-intro">
      <a class="back-link" href="index.html">&larr; Library</a>
      <button id="mode-toggle" class="mode-toggle" type="button" aria-pressed="false">
        Map -&gt;
      </button>
    </section>

    <div id="viewer-content" class="viewer-content">
      <section class="viewer" id="viewer">
        <div class="viewer-stage">
          <button
            id="prev-button"
            class="page-nav-hit-area page-nav-hit-area-prev"
            type="button"
            aria-label="Previous page"
          ></button>
          <div class="page-container" id="page-container" aria-live="polite"></div>
          <button
            id="next-button"
            class="page-nav-hit-area page-nav-hit-area-next"
            type="button"
            aria-label="Next page"
          ></button>
        </div>
      </section>
      <p id="page-indicator" class="page-indicator viewer-page-indicator"></p>
    </div>
  </main>

  <script type="module" src="js/viewer.js"></script>
</body>
</html>
